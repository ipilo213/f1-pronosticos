<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>F1 Pronósticos 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,300;0,400;0,600;0,700;0,800;0,900;1,700&family=Barlow:wght@300;400;500;600&family=Roboto+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- SCREEN: SELECT USER -->
<div id="screen-select" class="screen active">
  <div class="select-hero">
    <div class="hero-track-lines"></div>
    <div class="hero-content">
      <div class="hero-badge">TEMPORADA 2026</div>
      <h1 class="hero-title"><span class="hero-f1">F1</span> PRONÓSTICOS</h1>
      <p class="hero-sub">¿QUIÉN SOS?</p>
      <div class="name-grid" id="name-grid"></div>
    </div>
    <div class="hero-car">
      <div class="f1-car-wrap">
        <div class="f1-car-exhaust"></div>
        <svg width="200" height="48" viewBox="0 0 200 48" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- rear wing -->
          <rect x="8" y="6" width="22" height="4" rx="1" fill="#E10600"/>
          <rect x="12" y="10" width="2" height="8" fill="#cc0000"/>
          <rect x="20" y="10" width="2" height="8" fill="#cc0000"/>
          <!-- body -->
          <path d="M30 18 L50 12 L140 12 L165 18 L160 30 L35 30 Z" fill="#E10600"/>
          <!-- cockpit -->
          <path d="M80 12 L95 4 L120 4 L130 12 Z" fill="#111"/>
          <path d="M83 12 L96 6 L118 6 L128 12 Z" fill="#1a1a2e" opacity="0.8"/>
          <!-- front nose -->
          <path d="M155 18 L190 22 L185 26 L160 26 Z" fill="#cc0000"/>
          <!-- front wing -->
          <rect x="170" y="28" width="28" height="3" rx="1" fill="#E10600"/>
          <rect x="178" y="25" width="2" height="6" fill="#cc0000"/>
          <rect x="188" y="25" width="2" height="6" fill="#cc0000"/>
          <!-- sidepods -->
          <rect x="90" y="28" width="55" height="6" rx="2" fill="#c00500"/>
          <!-- rear wheel -->
          <circle cx="48" cy="34" r="10" fill="#1a1a1a"/>
          <circle cx="48" cy="34" r="7" fill="#2a2a2a"/>
          <circle cx="48" cy="34" r="3" fill="#444"/>
          <!-- front wheel -->
          <circle cx="162" cy="34" r="9" fill="#1a1a1a"/>
          <circle cx="162" cy="34" r="6" fill="#2a2a2a"/>
          <circle cx="162" cy="34" r="3" fill="#444"/>
          <!-- halo -->
          <path d="M88 12 Q100 8 112 12" stroke="#888" stroke-width="2" fill="none"/>
          <!-- number -->
          <text x="105" y="24" text-anchor="middle" font-family="Arial Black" font-size="8" font-weight="900" fill="white">BCU</text>
        </svg>
      </div>
    </div>
  </div>
</div>

<!-- SCREEN: MAIN APP -->
<div id="screen-main" class="screen">

  <!-- HEADER -->
  <header class="app-header">
    <div class="header-logo" onclick="changeUser()">
      <svg width="42" height="28" viewBox="0 0 42 28" fill="none">
        <rect width="42" height="28" rx="3" fill="#E10600"/>
        <text x="21" y="21" text-anchor="middle" font-family="Barlow Condensed" font-weight="900" font-size="18" fill="white">F1</text>
      </svg>
    </div>
    <div class="header-mid">
      <span class="header-season">2026</span>
      <span class="header-title">PRONÓSTICOS</span>
    </div>
    <div class="header-user-pill" id="header-user-pill" onclick="changeUser()">
      <div class="user-avatar" id="user-avatar"></div>
      <span id="header-user-name"></span>
      <span class="change-hint">↩</span>
    </div>
  </header>

  <!-- NAV -->
  <nav class="app-nav">
    <button class="nav-btn active" data-tab="home" onclick="showTab('home')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </button>
    <button class="nav-btn" data-tab="pronosticar" onclick="showTab('pronosticar')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Pronosticar
    </button>
    <button class="nav-btn" data-tab="ranking" onclick="showTab('ranking')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      Ranking
    </button>
    <button class="nav-btn" data-tab="stats" onclick="showTab('stats')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      Stats
    </button>
    <button class="nav-btn admin-nav" data-tab="resultado" onclick="showTab('resultado')">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Admin
    </button>
  </nav>

  <!-- TAB: HOME -->
  <div class="tab-pane active" id="tab-home">
    <div class="home-hero-race" id="next-race-card"></div>
    <div class="home-stats-row" id="home-stats"></div>
    <div class="home-section">
      <h2 class="section-title">CAMPEONATO</h2>
      <div id="home-ranking-preview"></div>
    </div>
    <div class="home-section">
      <h2 class="section-title">ÚLTIMAS CARRERAS</h2>
      <div id="home-recent-races"></div>
    </div>
  </div>

  <!-- TAB: PRONOSTICAR -->
  <div class="tab-pane" id="tab-pronosticar">
    <div class="pane-inner">
      <div class="field-group">
        <label class="field-label">GRAN PREMIO</label>
        <select id="race-select" class="f1-select" onchange="loadPronostico()"></select>
      </div>
      <div id="pron-race-info"></div>
      <div id="pron-status"></div>
      <div class="positions-list" id="positions-list"></div>
      <div class="sticky-save">
        <button class="btn-f1" id="btn-save" onclick="savePronostico()">
          <span class="btn-text">GUARDAR PRONÓSTICO</span>
          <span class="btn-flag">🏁</span>
        </button>
      </div>
    </div>
  </div>

  <!-- TAB: RANKING -->
  <div class="tab-pane" id="tab-ranking">
    <div class="pane-inner">
      <div class="ranking-toggle">
        <button class="toggle-btn active" onclick="setRankMode('general',this)">CAMPEONATO</button>
        <button class="toggle-btn" onclick="setRankMode('carrera',this)">POR CARRERA</button>
      </div>
      <div id="rank-race-sel" style="display:none" class="field-group">
        <label class="field-label">GRAN PREMIO</label>
        <select id="race-select-rank" class="f1-select" onchange="loadRankCarrera()"></select>
      </div>
      <div id="ranking-body"></div>
      <div id="chart-section" style="display:none">
        <h2 class="section-title" style="margin-top:2rem">EVOLUCIÓN</h2>
        <div class="chart-wrap"><canvas id="evo-chart"></canvas></div>
      </div>
    </div>
  </div>

  <!-- TAB: STATS -->
  <div class="tab-pane" id="tab-stats"></div>

  <!-- TAB: ADMIN -->
  <div class="tab-pane" id="tab-resultado">
    <div class="pane-inner">
      <div id="admin-gate">
        <div class="pin-panel">
          <div class="pin-logo">🔐</div>
          <h2 class="pin-heading">ZONA ADMIN</h2>
          <p class="pin-desc">Solo Nacho puede cargar resultados oficiales</p>
          <div class="pin-row" id="pin-row">
            <input type="password" maxlength="1" class="pin-box" oninput="pinIn(this,0)" onkeydown="pinDel(event,0)">
            <input type="password" maxlength="1" class="pin-box" oninput="pinIn(this,1)" onkeydown="pinDel(event,1)">
            <input type="password" maxlength="1" class="pin-box" oninput="pinIn(this,2)" onkeydown="pinDel(event,2)">
            <input type="password" maxlength="1" class="pin-box" oninput="pinIn(this,3)" onkeydown="pinDel(event,3)">
          </div>
          <div id="pin-err"></div>
        </div>
      </div>
      <div id="admin-panel" style="display:none">
        <div class="field-group">
          <label class="field-label">GRAN PREMIO</label>
          <select id="race-select-admin" class="f1-select" onchange="loadAdminResult()"></select>
        </div>
        <p class="field-label" style="margin-bottom:1rem">RESULTADO OFICIAL</p>
        <div class="positions-list" id="admin-pos-list"></div>
        <div class="sticky-save">
          <button class="btn-f1 btn-admin" id="btn-save-res" onclick="saveResultado()">
            <span class="btn-text">GUARDAR RESULTADO</span>
            <span class="btn-flag">✓</span>
          </button>
        </div>
      </div>
    </div>
  </div>

</div><!-- /screen-main -->

<!-- TOAST -->
<div id="toast" class="toast"></div>

<!-- MODAL DETALLE CARRERA -->
<div id="modal" class="modal-overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="app.js"></script>
</body>
</html>
